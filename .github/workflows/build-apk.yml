name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: 21
          distribution: temurin

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install npm dependencies
        run: npm install

      - name: Download ARM64 codex runtime from npm
        run: |
          cd /tmp
          npm pack @mmmbuto/codex-cli-termux
          tar xzf mmmbuto-codex-cli-termux-*.tgz
          echo "CODEX_ANDROID_RUNTIME_SOURCE=/tmp/package/bin" >> $GITHUB_ENV

      - name: Stage Android runtime into APK assets
        run: npm run stage:android:runtime

      - name: Build Android web assets (Vue + Vite)
        run: npm run build:android

      - name: Build debug APK with Gradle
        run: |
          cd android-app
          gradle assembleDebug

      - name: Upload debug APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: codexapp-debug
          path: android-app/app/build/outputs/apk/debug/app-debug.apk

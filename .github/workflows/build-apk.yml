name: Build Android APK

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: 21
          distribution: temurin

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install required SDK components
        run: |
          yes | $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager \
            "platforms;android-34" \
            "build-tools;34.0.0" 2>&1 | tail -5

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install npm dependencies
        run: npm install

      - name: Download ARM64 codex runtime
        run: |
          cd /tmp
          PKG_FILE=$(npm pack @mmmbuto/codex-cli-termux 2>/dev/null | tail -1)
          echo "Tarball: $PKG_FILE"
          tar xzf "$PKG_FILE"
          echo "CODEX_ANDROID_RUNTIME_SOURCE=/tmp/package/bin" >> $GITHUB_ENV

      - name: Stage Android runtime into APK assets
        run: npm run stage:android:runtime

      - name: Build Android web assets (Vue + Vite)
        run: npm run build:android

      - name: Build debug APK with Gradle wrapper
        run: |
          cd android-app
          ./gradlew assembleDebug

      - name: Rename APK with version
        run: |
          VERSION=$(node -p "require('./package.json').version")
          cp android-app/app/build/outputs/apk/debug/app-debug.apk "CodexWebLocal-v${VERSION}.apk"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: CodexWebLocal-APK
          path: CodexWebLocal-*.apk

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: "Codex Web Local ${{ github.ref_name }}"
          body: |
            ## Codex Web Local APK Release
            
            - Version: ${{ github.ref_name }}
            - Build: Automatic from GitHub Actions
          files: CodexWebLocal-*.apk
          draft: false
          prerelease: false
